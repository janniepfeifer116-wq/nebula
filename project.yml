name: NebulaStats

options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  NebulaStats:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NebulaStats
    # Account-specific identity (bundle id, team) lives in one place:
    configFiles:
      Debug: Config/AppConfig.xcconfig
      Release: Config/AppConfig.xcconfig
    settings:
      base:
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"          # iPhone + iPad
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Nebula Stats"
        # Only standard HTTPS (exempt) encryption — answers App Store Connect's
        # export-compliance question automatically for every uploaded build.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

<svg width="1024" height="1024" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="icoArc" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset=".5" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <radialGradient id="icoBg" cx="80%" cy="10%" r="120%">
      <stop offset="0" stop-color="#2A1B54"/>
      <stop offset=".45" stop-color="#151132"/>
      <stop offset="1" stop-color="#0B0B1E"/>
    </radialGradient>
  </defs>
  <!-- Full-bleed square: App Store icons may not contain transparency;
       iOS applies the rounded mask itself. -->
  <rect width="180" height="180" fill="url(#icoBg)"/>
  <circle cx="38" cy="34" r="1.5" fill="rgba(255,255,255,.6)"/>
  <circle cx="142" cy="52" r="1.2" fill="rgba(255,255,255,.4)"/>
  <circle cx="60" cy="150" r="1.4" fill="rgba(190,210,255,.5)"/>
  <circle cx="150" cy="130" r="1" fill="rgba(255,255,255,.35)"/>
  <circle cx="24" cy="96" r="1" fill="rgba(255,255,255,.3)"/>
  <circle cx="90" cy="90" r="52" fill="none" stroke="url(#icoArc)" stroke-width="11"
          stroke-linecap="round" stroke-dasharray="245 82" transform="rotate(120 90 90)"
          style="filter:drop-shadow(0 0 14px rgba(56,189,248,.6))"/>
  <circle cx="90" cy="90" r="18" fill="url(#icoArc)"
          style="filter:drop-shadow(0 0 12px rgba(56,189,248,.7))"/>
  <circle cx="139" cy="63" r="6.5" fill="#C4B5FD" style="filter:drop-shadow(0 0 7px #A78BFA)"/>
</svg>
